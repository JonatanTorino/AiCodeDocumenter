schema: spec-driven

context: |
  Tech stack: Python 3.10+ (scripts), PowerShell 5.1+ (scripts), Markdown (prompts/workflows/agents/references/templates)
  Architecture: Claude Code plugin ("document-xpp") — no app build; deliverables are prompts, workflows, agents, Python/PS scripts
  Testing: no automated test suite; validation is manual against golden workspace sample (.validation/)
  Style: conventional commits, one PR per milestone, no Co-Authored-By

strict_tdd: false

testing:
  strict_tdd: false
  note: "No test runner detected — Strict TDD Mode unavailable"
  test_runner: null
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  quality_tools:
    linter: false
    type_checker: false
    formatter: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected plugin phases/workflows
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing Markdown conventions (prompts, workflows, agents)
    - Reference tracking-schema.md as data contract — never invent fields
    - Never duplicate content between files — this is a dispatcher-based repo
  verify:
    - No automated tests — validate manually against golden workspace sample
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
